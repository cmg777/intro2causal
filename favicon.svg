<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Forking path: treatment vs control -->
  <line x1="6" y1="24" x2="16" y2="14" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="26" y2="8" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="26" y2="20" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3,2"/>
  <!-- Treatment dot -->
  <circle cx="26" cy="8" r="2.5" fill="#059669"/>
  <!-- Control dot -->
  <circle cx="26" cy="20" r="2.5" fill="#7c3aed"/>
  <!-- Fork point -->
  <circle cx="16" cy="14" r="2" fill="#2563eb"/>
</svg>
