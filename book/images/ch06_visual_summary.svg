<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Large faded chapter number -->
  <text x="680" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="260" font-weight="800" fill="#1e293b">06</text>
  <!-- Title -->
  <text x="60" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#059669">The Wages of Schooling</text>
  <!-- Graduation cap icon -->
  <!-- Cap top (diamond shape) -->
  <polygon points="400,130 460,155 400,175 340,155" fill="#059669"/>
  <!-- Cap brim -->
  <rect x="365" y="170" width="70" height="8" rx="2" fill="#059669"/>
  <!-- Tassel -->
  <line x1="460" y1="155" x2="475" y2="175" stroke="#059669" stroke-width="2"/>
  <circle cx="475" cy="178" r="4" fill="#059669"/>
  <!-- Upward arrow with dollar -->
  <line x1="400" y1="200" x2="400" y2="250" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="250" x2="440" y2="250" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Arrow going up-right -->
  <line x1="400" y1="250" x2="480" y2="195" stroke="#059669" stroke-width="3"/>
  <polygon points="480,195 470,200 475,210" fill="#059669"/>
  <!-- Dollar sign -->
  <text x="490" y="200" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#059669" opacity="0.8">$</text>
  <!-- Small axis labels -->
  <text x="390" y="265" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Schooling</text>
  <text x="495" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Wages</text>
  <!-- Connecting concept dots -->
  <circle cx="320" cy="225" r="3" fill="#059669" opacity="0.3"/>
  <circle cx="350" cy="235" r="3" fill="#059669" opacity="0.3"/>
  <circle cx="430" cy="225" r="3" fill="#059669" opacity="0.3"/>
  <circle cx="460" cy="215" r="3" fill="#059669" opacity="0.3"/>
  <!-- Keywords -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">Twins  |  Quarter of Birth  |  Sheepskin Effects</text>
</svg>