<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="1">The Causal Inference Toolkit</text>
  <!-- Connecting line -->
  <line x1="130" y1="210" x2="670" y2="210" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <!-- Circle 1: RCT (CausalBlue) -->
  <circle cx="130" cy="210" r="48" fill="#2563eb"/>
  <text x="130" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">RT</text>
  <text x="130" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.8">Trials</text>
  <!-- Circle 2: Regression (MethodPurple) -->
  <circle cx="265" cy="210" r="48" fill="#7c3aed"/>
  <text x="265" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">RG</text>
  <text x="265" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.8">Regression</text>
  <!-- Circle 3: IV (EvidenceGreen) -->
  <circle cx="400" cy="210" r="48" fill="#059669"/>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">IV</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.8">Instruments</text>
  <!-- Circle 4: RD (CausalBlue) -->
  <circle cx="535" cy="210" r="48" fill="#2563eb"/>
  <text x="535" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">RD</text>
  <text x="535" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.8">Discontinuity</text>
  <!-- Circle 5: DD (MethodPurple) -->
  <circle cx="670" cy="210" r="48" fill="#7c3aed"/>
  <text x="670" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">DD</text>
  <text x="670" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.8">Diff-in-Diff</text>
  <!-- Chapter numbers below -->
  <text x="130" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Ch 1</text>
  <text x="265" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Ch 2</text>
  <text x="400" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Ch 3</text>
  <text x="535" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Ch 4</text>
  <text x="670" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Ch 5</text>
  <!-- Tagline -->
  <text x="400" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="2">FIVE TOOLS FOR CREDIBLE CAUSAL EVIDENCE</text>
</svg>