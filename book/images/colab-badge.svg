<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 154 20" width="154" height="20">
  <defs>
    <clipPath id="r">
      <rect width="154" height="20" rx="3"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- Orange left section -->
    <rect width="54" height="20" fill="#F9AB00"/>
    <!-- Gray right section -->
    <rect x="54" width="100" height="20" fill="#555"/>
    <!-- Colab icon: simplified notebook -->
    <circle cx="18" cy="10" r="7" fill="none" stroke="#fff" stroke-width="1.3"/>
    <path d="M15,7 A4,4 0 0,1 21,7" fill="none" stroke="#fff" stroke-width="1.3"/>
    <path d="M15,13 A4,4 0 0,0 21,13" fill="none" stroke="#fff" stroke-width="1.3"/>
    <!-- Left text -->
    <text x="33" y="14" font-family="DejaVu Sans, Verdana, Geneva, sans-serif" font-size="11" fill="#fff">&#9654;</text>
    <!-- Right text -->
    <text x="62" y="14" font-family="DejaVu Sans, Verdana, Geneva, sans-serif" font-size="11" fill="#fff">Open in Colab</text>
  </g>
</svg>