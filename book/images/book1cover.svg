<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="800" height="1100" rx="24" ry="24"/>
    </clipPath>
    <clipPath id="imgClip">
      <rect x="40" y="400" width="720" height="405" rx="12" ry="12"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="800" height="1100" rx="24" ry="24" fill="#0f172a"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="796" height="1096" rx="22" ry="22" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="160" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="1">Mastering</text>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="1">Causal Metrics</text>

  <!-- Subtitle -->
  <text x="400" y="290" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" fill="#38bdf8" letter-spacing="2">An AI-Powered Study Guide</text>

  <!-- Decorative line under subtitle -->
  <line x1="280" y1="315" x2="520" y2="315" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Furious Five cover image embedded -->
  <image x="40" y="400" width="720" height="405" href="cover.jpg" clip-path="url(#imgClip)" preserveAspectRatio="xMidYMid slice"/>
  <!-- Border around image -->
  <rect x="40" y="400" width="720" height="405" rx="12" ry="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Five method circles below the image -->
  <circle cx="130" cy="870" r="28" fill="#2563eb"/>
  <text x="130" y="866" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">RT</text>
  <text x="130" y="882" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff" opacity="0.8">Ch 1</text>

  <circle cx="265" cy="870" r="28" fill="#7c3aed"/>
  <text x="265" y="866" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">OLS</text>
  <text x="265" y="882" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff" opacity="0.8">Ch 2</text>

  <circle cx="400" cy="870" r="28" fill="#059669"/>
  <text x="400" y="866" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">IV</text>
  <text x="400" y="882" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff" opacity="0.8">Ch 3</text>

  <circle cx="535" cy="870" r="28" fill="#f5a623"/>
  <text x="535" y="866" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">RD</text>
  <text x="535" y="882" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff" opacity="0.8">Ch 4</text>

  <circle cx="670" cy="870" r="28" fill="#f87171"/>
  <text x="670" y="866" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">DiD</text>
  <text x="670" y="882" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff" opacity="0.8">Ch 5</text>

  <!-- Connecting line between circles -->
  <line x1="158" y1="870" x2="642" y2="870" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Bottom separator -->
  <line x1="250" y1="940" x2="550" y2="940" stroke="#1e293b" stroke-width="1"/>

  <!-- Author -->
  <text x="400" y="990" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" fill="#94a3b8" letter-spacing="3">Carlos Mendez</text>

  <!-- Year -->
  <text x="400" y="1030" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#475569" letter-spacing="2">2026</text>
</svg>
