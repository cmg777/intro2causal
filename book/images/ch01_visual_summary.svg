<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Large faded chapter number -->
  <text x="680" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="260" font-weight="800" fill="#1e293b">01</text>
  <!-- Title -->
  <text x="60" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#2563eb">Randomized Trials</text>
  <!-- Dice / random assignment icon -->
  <!-- Dice body -->
  <rect x="310" y="130" width="60" height="60" rx="10" fill="#2563eb" transform="rotate(-15, 340, 160)"/>
  <circle cx="325" cy="145" r="4" fill="#ffffff" transform="rotate(-15, 340, 160)"/>
  <circle cx="355" cy="145" r="4" fill="#ffffff" transform="rotate(-15, 340, 160)"/>
  <circle cx="325" cy="175" r="4" fill="#ffffff" transform="rotate(-15, 340, 160)"/>
  <circle cx="355" cy="175" r="4" fill="#ffffff" transform="rotate(-15, 340, 160)"/>
  <circle cx="340" cy="160" r="4" fill="#ffffff" transform="rotate(-15, 340, 160)"/>
  <!-- Arrow from dice to groups -->
  <line x1="385" y1="170" x2="440" y2="150" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="385" y1="170" x2="440" y2="210" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <!-- Arrowheads -->
  <polygon points="440,150 432,145 434,155" fill="#ffffff" opacity="0.6"/>
  <polygon points="440,210 432,205 434,215" fill="#ffffff" opacity="0.6"/>
  <!-- Treatment group -->
  <circle cx="490" cy="140" r="18" fill="#059669"/>
  <circle cx="520" cy="135" r="18" fill="#059669" opacity="0.7"/>
  <circle cx="505" cy="155" r="18" fill="#059669" opacity="0.5"/>
  <text x="505" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">Treatment</text>
  <!-- Control group -->
  <circle cx="490" cy="220" r="18" fill="#7c3aed"/>
  <circle cx="520" cy="215" r="18" fill="#7c3aed" opacity="0.7"/>
  <circle cx="505" cy="235" r="18" fill="#7c3aed" opacity="0.5"/>
  <text x="505" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">Control</text>
  <!-- Random label -->
  <text x="340" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5">Random</text>
  <text x="340" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5">Assignment</text>
  <!-- Keywords -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">Selection Bias  |  Potential Outcomes  |  RAND HIE</text>
</svg>