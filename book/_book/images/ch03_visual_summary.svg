<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Large faded chapter number -->
  <text x="680" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="260" font-weight="800" fill="#1e293b">03</text>
  <!-- Title -->
  <text x="60" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#059669">Instrumental Variables</text>
  <!-- IV Diagram: Z -> D -> Y, no direct Z -> Y -->
  <!-- Z circle (instrument) -->
  <circle cx="300" cy="190" r="36" fill="#059669"/>
  <text x="300" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Z</text>
  <text x="300" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Instrument</text>
  <!-- D circle (treatment) -->
  <circle cx="440" cy="140" r="36" fill="#2563eb"/>
  <text x="440" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff">D</text>
  <text x="440" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Treatment</text>
  <!-- Y circle (outcome) -->
  <circle cx="580" cy="190" r="36" fill="#7c3aed"/>
  <text x="580" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Y</text>
  <text x="580" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Outcome</text>
  <!-- Arrow Z -> D -->
  <line x1="332" y1="175" x2="408" y2="152" stroke="#ffffff" stroke-width="2.5"/>
  <polygon points="408,152 397,148 400,158" fill="#ffffff"/>
  <!-- Arrow D -> Y -->
  <line x1="472" y1="155" x2="548" y2="178" stroke="#ffffff" stroke-width="2.5"/>
  <polygon points="548,178 537,174 540,184" fill="#ffffff"/>
  <!-- Crossed-out Z -> Y (exclusion restriction) -->
  <line x1="332" y1="205" x2="548" y2="205" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- X mark on the dashed line -->
  <line x1="430" y1="195" x2="450" y2="215" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <line x1="450" y1="195" x2="430" y2="215" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <!-- Exclusion label -->
  <text x="440" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" opacity="0.6">Exclusion</text>
  <!-- Keywords -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">LATE  |  Compliers  |  Minneapolis DV Experiment</text>
</svg>