<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Large faded chapter number -->
  <text x="680" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="260" font-weight="800" fill="#1e293b">04</text>
  <!-- Title -->
  <text x="60" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#2563eb">Regression Discontinuity</text>
  <!-- RD diagram -->
  <!-- Axes -->
  <line x1="250" y1="100" x2="250" y2="270" stroke="#475569" stroke-width="2"/>
  <line x1="250" y1="270" x2="570" y2="270" stroke="#475569" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="240" y="95" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Outcome</text>
  <text x="575" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Running Variable</text>
  <!-- Threshold vertical line -->
  <line x1="410" y1="105" x2="410" y2="270" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="410" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.4">Cutoff</text>
  <!-- Left curve (below threshold) -->
  <path d="M270,230 Q310,220 350,210 Q380,200 405,190" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- Right curve (above threshold, shifted up = treatment effect) -->
  <path d="M415,155 Q440,148 470,140 Q510,130 550,125" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- Jump indicator -->
  <line x1="410" y1="190" x2="410" y2="155" stroke="#059669" stroke-width="2.5"/>
  <!-- Jump arrow -->
  <polygon points="410,155 405,163 415,163" fill="#059669"/>
  <!-- Causal effect label -->
  <text x="430" y="175" font-family="system-ui, sans-serif" font-size="13" fill="#059669" font-weight="600">Causal</text>
  <text x="430" y="190" font-family="system-ui, sans-serif" font-size="13" fill="#059669" font-weight="600">Effect</text>
  <!-- Dots near threshold -->
  <circle cx="380" cy="205" r="4" fill="#2563eb" opacity="0.5"/>
  <circle cx="395" cy="195" r="4" fill="#2563eb" opacity="0.5"/>
  <circle cx="425" cy="150" r="4" fill="#2563eb" opacity="0.5"/>
  <circle cx="440" cy="145" r="4" fill="#2563eb" opacity="0.5"/>
  <!-- Keywords -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">Sharp RD  |  Bandwidth  |  MLDA and Mortality</text>
</svg>