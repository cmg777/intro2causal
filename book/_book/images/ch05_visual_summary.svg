<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0f172a"/>
  <!-- Large faded chapter number -->
  <text x="680" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="260" font-weight="800" fill="#1e293b">05</text>
  <!-- Title -->
  <text x="60" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#7c3aed">Differences-in-Differences</text>
  <!-- DD diagram -->
  <!-- Axes -->
  <line x1="260" y1="100" x2="260" y2="270" stroke="#475569" stroke-width="2"/>
  <line x1="260" y1="270" x2="560" y2="270" stroke="#475569" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="250" y="95" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Outcome</text>
  <!-- Time labels -->
  <text x="340" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Pre</text>
  <text x="490" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Post</text>
  <!-- Treatment vertical line -->
  <line x1="415" y1="105" x2="415" y2="270" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <text x="415" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.3">Treatment</text>
  <!-- Control group: parallel line (lower) -->
  <line x1="340" y1="230" x2="490" y2="200" stroke="#64748b" stroke-width="2.5"/>
  <circle cx="340" cy="230" r="7" fill="#64748b"/>
  <circle cx="490" cy="200" r="7" fill="#64748b"/>
  <text x="510" y="205" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Control</text>
  <!-- Treatment group: pre-treatment parallel -->
  <line x1="340" y1="195" x2="415" y2="178" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="340" cy="195" r="7" fill="#7c3aed"/>
  <!-- Treatment group: post-treatment diverges upward -->
  <line x1="415" y1="178" x2="490" y2="135" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="490" cy="135" r="7" fill="#7c3aed"/>
  <text x="510" y="140" font-family="system-ui, sans-serif" font-size="12" fill="#7c3aed">Treated</text>
  <!-- Counterfactual (dashed) -->
  <line x1="415" y1="178" x2="490" y2="165" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <circle cx="490" cy="165" r="5" fill="#7c3aed" opacity="0.3"/>
  <!-- Causal effect bracket -->
  <line x1="497" y1="135" x2="497" y2="165" stroke="#059669" stroke-width="2.5"/>
  <line x1="493" y1="135" x2="501" y2="135" stroke="#059669" stroke-width="2"/>
  <line x1="493" y1="165" x2="501" y2="165" stroke="#059669" stroke-width="2"/>
  <!-- DD label -->
  <text x="442" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#059669" font-weight="600">DD</text>
  <!-- Keywords -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">Parallel Trends  |  Two-Way FE  |  Great Depression Banking</text>
</svg>