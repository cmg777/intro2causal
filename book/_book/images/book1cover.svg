<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="800" height="1100" rx="24" ry="24"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="800" height="1100" rx="24" ry="24" fill="#0f172a"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="796" height="1096" rx="22" ry="22" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- Title -->
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="1">Mastering</text>
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="1">Causal Metrics</text>
  <!-- Subtitle -->
  <text x="400" y="330" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" fill="#2563eb" letter-spacing="2">An AI-Powered Study Guide</text>
  <!-- Decorative line under subtitle -->
  <line x1="280" y1="355" x2="520" y2="355" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <!-- Forking path diagram -->
  <!-- Main stem -->
  <line x1="400" y1="440" x2="400" y2="580" stroke="#2563eb" stroke-width="3"/>
  <!-- Fork point -->
  <circle cx="400" cy="580" r="6" fill="#2563eb"/>
  <!-- Treatment path (upper-right, solid) -->
  <path d="M400,580 C400,580 440,560 500,500 S580,440 620,420" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- Treatment endpoint -->
  <circle cx="620" cy="420" r="14" fill="#059669"/>
  <text x="620" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">T</text>
  <!-- Treatment label -->
  <text x="660" y="410" font-family="system-ui, sans-serif" font-size="14" fill="#059669" opacity="0.8">Treatment</text>
  <!-- Control path (lower-right, dashed) -->
  <path d="M400,580 C400,580 440,600 500,660 S580,720 620,740" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,5"/>
  <!-- Control endpoint -->
  <circle cx="620" cy="740" r="14" fill="#7c3aed"/>
  <text x="620" y="745" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">C</text>
  <!-- Control label -->
  <text x="660" y="750" font-family="system-ui, sans-serif" font-size="14" fill="#7c3aed" opacity="0.8">Control</text>
  <!-- Counterfactual label at fork -->
  <text x="340" y="595" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.4">Counterfactual</text>
  <!-- Small decorative dots along paths -->
  <circle cx="450" cy="540" r="3" fill="#2563eb" opacity="0.4"/>
  <circle cx="500" cy="500" r="3" fill="#2563eb" opacity="0.5"/>
  <circle cx="560" cy="450" r="3" fill="#059669" opacity="0.5"/>
  <circle cx="450" cy="620" r="3" fill="#7c3aed" opacity="0.3"/>
  <circle cx="500" cy="660" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="560" cy="710" r="3" fill="#7c3aed" opacity="0.4"/>
  <!-- Start point indicator -->
  <circle cx="400" cy="440" r="8" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="440" r="3" fill="#2563eb"/>
  <!-- Bottom separator -->
  <line x1="250" y1="920" x2="550" y2="920" stroke="#1e293b" stroke-width="1"/>
  <!-- Author -->
  <text x="400" y="970" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" fill="#94a3b8" letter-spacing="3">Carlos Mendez</text>
  <!-- Year -->
  <text x="400" y="1010" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#475569" letter-spacing="2">2026</text>
</svg>